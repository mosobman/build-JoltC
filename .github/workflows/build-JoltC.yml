name: build-JoltC

on:
  schedule:
    #- cron: "0 0 * * 0" # Every week
    - cron: "0 0 1 */4 *" # Every 4 months
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-24.04
    outputs:
      SHOULD_RUN:         ${{ steps.check.outputs.SHOULD_RUN }}
      OUTPUT_DATE:        ${{ steps.check.outputs.OUTPUT_DATE }}
      JOLTC_COMMIT:       ${{ steps.check.outputs.JOLTC_COMMIT }}
      JOLTPHYSICS_COMMIT: ${{ steps.check.outputs.JOLTPHYSICS_COMMIT }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: checkout JoltC
        uses: actions/checkout@v7
        with:
          repository: SecondHalfGames/JoltC
          submodules: true
          fetch-depth: 0

      - name: evaluate changes and set outputs
        id: check
        run: |
          # 1. Get the current commit of the JoltC submodule
          CURRENT_SUBMODULE_COMMIT=$(cd JoltC && git rev-parse HEAD)
          
          # 2. Get the body of the LATEST release
          LATEST_RELEASE_BODY=$(gh release view --json body -q '.body' 2>/dev/null || echo "")
          
          # 3. Extract the hash from the notes
          # Look for the commit URL and extract the 40-character hex string
          LATEST_RELEASE_COMMIT=$(echo "$LATEST_RELEASE_BODY" | grep -oE 'commit/[0-9a-f]{40}' | head -n 1 | cut -d'/' -f2 || echo "none")
          
          echo "Current Submodule: $CURRENT_SUBMODULE_COMMIT"
          echo "Last Release Notes Hash: $LATEST_RELEASE_COMMIT"
          
          # 4. Logic: Skip if matches, run if no match/no release
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$CURRENT_SUBMODULE_COMMIT" == "$LATEST_RELEASE_COMMIT" ]; then
            echo "SHOULD_RUN=false" >> $GITHUB_OUTPUT
            echo "::notice::No changes detected in JoltC submodule. Skipping build."
          else
            echo "SHOULD_RUN=true" >> $GITHUB_OUTPUT
          fi
          
          echo "OUTPUT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "JOLTC_COMMIT=$CURRENT_SUBMODULE_COMMIT" >> $GITHUB_OUTPUT
          
          # Get JoltPhysics submodule commit (for release notes)
          cd JoltPhysics
          echo "JOLTPHYSICS_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
  build:
    needs: check-changes
    if: needs.check-changes.outputs.SHOULD_RUN == 'true'
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, build_type: "Debug", obj_layer: 16, dbl_prec: "OFF", use_asserts: "ON", name_suffix: "Debug-X-X" }
          - { arch: x64, build_type: "Debug", obj_layer: 32, dbl_prec: "OFF", use_asserts: "ON", name_suffix: "Debug-O-X" }
          - { arch: x64, build_type: "Debug", obj_layer: 16, dbl_prec: "ON", use_asserts: "ON", name_suffix: "Debug-X-D" }
          - { arch: x64, build_type: "Debug", obj_layer: 32, dbl_prec: "ON", use_asserts: "ON", name_suffix: "Debug-O-D" }
          - { arch: x64, build_type: "Release", obj_layer: 16, dbl_prec: "OFF", use_asserts: "OFF", name_suffix: "Release-X-X" }
          - { arch: x64, build_type: "Release", obj_layer: 32, dbl_prec: "OFF", use_asserts: "OFF", name_suffix: "Release-O-X" }
          - { arch: x64, build_type: "Release", obj_layer: 16, dbl_prec: "ON", use_asserts: "OFF", name_suffix: "Release-X-D" }
          - { arch: x64, build_type: "Release", obj_layer: 32, dbl_prec: "ON", use_asserts: "OFF", name_suffix: "Release-O-D" }

    steps:
      - name: checkout this repo
        uses: actions/checkout@v7
      
      - name: checkout JoltC Source
        uses: actions/checkout@v7
        with:
          repository: SecondHalfGames/JoltC
          path: src
          submodules: true

      - name: build
        id: build
        shell: cmd
        run: call build.cmd ${{ matrix.arch }} ${{ matrix.build_type }} ${{ matrix.obj_layer }} ${{ matrix.dbl_prec }} ${{ matrix.use_asserts }} ${{ matrix.name_suffix }} ${{ needs.check-changes.outputs.OUTPUT_DATE }}

      - name: upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: JoltC-${{ matrix.arch }}-${{ matrix.name_suffix }}-${{ needs.check-changes.outputs.OUTPUT_DATE }}
          path: JoltC-${{ matrix.arch }}-${{ matrix.name_suffix }}-${{ needs.check-changes.outputs.OUTPUT_DATE }}.zip
          if-no-files-found: error
          archive: false

  release:
    runs-on: ubuntu-24.04
    needs: [check-changes, build]
    if: needs.check-changes.outputs.SHOULD_RUN == 'true'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: generate release notes
        run: |
          echo "[JoltC commit](https://github.com/SecondHalfGames/JoltC/commit/${{ needs.check-changes.outputs.JOLTC_COMMIT }})" > notes.txt
          echo "[Jolt commit](https://github.com/jrouwe/JoltPhysics/commit/${{ needs.check-changes.outputs.JOLTPHYSICS_COMMIT }})" >> notes.txt

      - name: create release
        run: |
          # Cleanup previous release if it exists
          gh release delete "${{ needs.check-changes.outputs.OUTPUT_DATE }}" -y --cleanup-tag -R "${GITHUB_REPOSITORY}" || true
          
          gh release create ${{ needs.check-changes.outputs.OUTPUT_DATE }} -R "${GITHUB_REPOSITORY}" -t '${{ needs.check-changes.outputs.OUTPUT_DATE }}' -F notes.txt

      - name: get artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: JoltC-*
          merge-multiple: true
          path: all-artifacts
      
      - name: Verify artifacts exist
        run: ls -R all-artifacts/

      - name: upload artifacts
        shell: bash
        run: |
          # Verify files exist before looping
          shopt -s nullglob
          files=(all-artifacts/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Error: No zip files found in all-artifacts/"
            exit 1
          fi
          
          for file in "${files[@]}"; do
            gh release upload "${{ needs.check-changes.outputs.OUTPUT_DATE }}" "$file" -R "${GITHUB_REPOSITORY}"
          done
